services:
  - type: web
    name: o-abstrato-doido
    env: node
    region: frankfurt  # muda para a região mais próxima de ti
    plan: free
    buildCommand: pnpm install && pnpm run build:render
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true   # Render gera automaticamente um valor seguro
      - key: DATABASE_URL
        fromDatabase:
          name: o-abstrato-doido-db
          property: connectionString

databases:
  - name: o-abstrato-doido-db
    plan: free
    region: frankfurt
